<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="halo" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#9DFAFF" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#9DFAFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#9DFAFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#9DFAFF"/>
    </linearGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#FFFFFF" fill-opacity="0.07"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- logo + wordmark -->
  <g transform="translate(80,80)">
    <rect width="56" height="56" rx="14" fill="#121212" stroke="#262626"/>
    <ellipse cx="28" cy="28" rx="10.5" ry="14" fill="none" stroke="#9DFAFF" stroke-width="5.5"/>
    <text x="78" y="38" font-family="Geist, -apple-system, system-ui, sans-serif" font-size="28" font-weight="600" fill="#F5F5F5" letter-spacing="-0.5"><tspan fill="#9DFAFF">0</tspan>colors</text>
  </g>

  <!-- eyebrow -->
  <g transform="translate(80,200)">
    <rect width="240" height="34" rx="17" fill="rgba(255,255,255,0.03)" stroke="#262626"/>
    <circle cx="20" cy="17" r="4" fill="#9DFAFF"/>
    <text x="34" y="22" font-family="Geist Mono, monospace" font-size="12" fill="#A3A3A3" letter-spacing="1.4">OPEN SOURCE · MIT · V1.1</text>
  </g>

  <!-- headline -->
  <text x="80" y="320" font-family="Geist, system-ui, sans-serif" font-size="84" font-weight="600" fill="#F5F5F5" letter-spacing="-3">Your design system,</text>
  <text x="80" y="412" font-family="Geist, system-ui, sans-serif" font-size="84" font-weight="600" fill="url(#title)" letter-spacing="-3">on an infinite canvas.</text>

  <!-- subhead -->
  <text x="80" y="478" font-family="Geist, system-ui, sans-serif" font-size="24" fill="#A3A3A3">Build colors, tokens, and themes visually.</text>
  <text x="80" y="512" font-family="Geist, system-ui, sans-serif" font-size="24" fill="#A3A3A3">Self-host on Railway in one click.</text>

  <!-- right-side mini canvas card -->
  <g transform="translate(740,140)" opacity="0.95">
    <rect width="380" height="340" rx="20" fill="#121212" stroke="#262626"/>
    <rect x="20" y="20" width="340" height="200" rx="12" fill="#0A0A0A" stroke="#262626"/>

    <!-- node 1 (color) -->
    <g transform="translate(40,40)">
      <rect width="160" height="80" rx="10" fill="#171717" stroke="#9DFAFF" stroke-opacity="0.45"/>
      <rect x="10" y="14" width="32" height="32" rx="7" fill="#3B82F6"/>
      <text x="50" y="32" font-family="Geist, sans-serif" font-size="13" font-weight="500" fill="#F5F5F5">Brand · 500</text>
      <text x="50" y="50" font-family="Geist Mono, monospace" font-size="11" fill="#8A8A8A">#3B82F6</text>
      <g transform="translate(10,58)">
        <rect width="14" height="12" rx="2" fill="#eff6ff"/>
        <rect x="16" width="14" height="12" rx="2" fill="#bfdbfe"/>
        <rect x="32" width="14" height="12" rx="2" fill="#60a5fa"/>
        <rect x="48" width="14" height="12" rx="2" fill="#3b82f6" stroke="#9DFAFF" stroke-width="1.5"/>
        <rect x="64" width="14" height="12" rx="2" fill="#1d4ed8"/>
        <rect x="80" width="14" height="12" rx="2" fill="#1e3a8a"/>
      </g>
    </g>

    <!-- node 2 (token) -->
    <g transform="translate(220,130)">
      <rect width="120" height="64" rx="10" fill="#171717" stroke="#262626"/>
      <rect x="10" y="10" width="48" height="14" rx="7" fill="#3B82F6" fill-opacity="0.18"/>
      <text x="34" y="20" text-anchor="middle" font-family="Geist Mono, monospace" font-size="9" font-weight="600" fill="#60A5FA">TOKEN</text>
      <text x="10" y="44" font-family="Geist Mono, monospace" font-size="11" fill="#F5F5F5">color.primary</text>
    </g>

    <!-- connector -->
    <path d="M 200 80 C 230 80, 230 162, 260 162" stroke="#9DFAFF" stroke-width="1.5" stroke-dasharray="4 4" fill="none" opacity="0.55"/>

    <!-- tokens table peek footer -->
    <g transform="translate(20,240)">
      <rect width="340" height="84" rx="10" fill="#171717" stroke="#262626"/>
      <g font-family="Geist Mono, monospace" font-size="11" fill="#A3A3A3">
        <g transform="translate(14,22)">
          <rect width="12" height="12" rx="3" fill="#3B82F6"/>
          <text x="22" y="11">color.primary</text>
          <text x="240" y="11" fill="#8A8A8A">#3B82F6</text>
        </g>
        <g transform="translate(14,46)">
          <rect width="12" height="12" rx="3" fill="#60A5FA"/>
          <text x="22" y="11">color.hover</text>
          <text x="240" y="11" fill="#8A8A8A">#60A5FA</text>
        </g>
        <g transform="translate(14,70)">
          <rect width="12" height="12" rx="3" fill="#EF4444"/>
          <text x="22" y="11">color.danger</text>
          <text x="240" y="11" fill="#8A8A8A">#EF4444</text>
        </g>
      </g>
    </g>
  </g>

  <!-- footer pill -->
  <g transform="translate(80,540)">
    <rect width="280" height="40" rx="20" fill="#3B82F6"/>
    <text x="140" y="26" text-anchor="middle" font-family="Geist, sans-serif" font-size="15" font-weight="500" fill="#FFFFFF">Deploy on Railway →</text>
  </g>
  <g transform="translate(380,540)">
    <rect width="220" height="40" rx="20" fill="transparent" stroke="#404040"/>
    <text x="110" y="26" text-anchor="middle" font-family="Geist, sans-serif" font-size="15" font-weight="500" fill="#F5F5F5">View on GitHub</text>
  </g>
</svg>
